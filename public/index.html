<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#07111c" />
  <meta name="description" content="TheMatch" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css" />
  <title>TheMatch</title>
</head>
<body>
  <main class="shell">
    <header class="topbar card">
      <div>
        <p class="eyebrow">TheMatch</p>
        <p class="eyebrow-sub">быстрый рабочий матч</p>
      </div>
      <button id="share-btn" class="icon-btn" type="button" aria-label="Поделиться результатом">⇪</button>
    </header>

    <section class="workspace card" aria-labelledby="calc-title">
      <div class="compact-head">
        <h1 id="calc-title">Коллеги</h1>
        <p class="microcopy">Две даты. Один экран.</p>
      </div>

      <form id="compat-form" class="form-grid" autocomplete="off">
        <label>
          <span>Дата 1</span>
          <input id="date-1" name="date1" type="date" required />
        </label>
        <label>
          <span>Дата 2</span>
          <input id="date-2" name="date2" type="date" required />
        </label>
        <button type="submit">Смотреть</button>
      </form>

      <div class="result-dock">
        <span class="result-dock-label">Результат</span>
      </div>

      <section id="results" class="results" aria-live="polite"></section>
    </section>
  </main>

  <template id="result-template">
    <article class="result-card">
      <div class="result-top">
        <div class="score-ring">
          <div>
            <strong class="score-value"></strong>
            <span class="score-label"></span>
          </div>
        </div>
        <div class="pair-stats">
          <p class="pair-title"></p>
          <p class="pair-phrase"></p>
        </div>
      </div>
      <div class="people-grid"></div>
      <div class="pair-grid">
        <div>
          <span>Ритм</span>
          <p class="pair-dynamic"></p>
        </div>
        <div>
          <span>Трение</span>
          <p class="pair-friction"></p>
        </div>
        <div>
          <span>Сила</span>
          <p class="pair-synergy"></p>
        </div>
        <div>
          <span>Совет</span>
          <p class="pair-tip"></p>
        </div>
      </div>
    </article>
  </template>

  <script src="logic.js"></script>
  <script src="app.js"></script>
</body>
</html>
